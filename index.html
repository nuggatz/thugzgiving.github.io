<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>thugzgiving — home</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0b0f10;
    color: #eaeaea;
    font-family: monospace;
    min-height: 100vh;
    margin: 0;
    padding: 24px 20px;
    overflow-x: hidden;
    position: relative;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    width: 100%;
    min-height: 80vh;
    z-index: 1;
  }

  a {
    color: #eaeaea;
    text-decoration: none;
  }
  
  a:hover {
    text-decoration: underline;
  }

  .item {
    position: absolute;
    font-size: 14px;
  }

  .small {
    font-size: 12px;
    opacity: 0.7;
  }

  .accent {
    color: #8aff80;
  }

  .cursor {
    display: inline-block;
    width: 6px;
    height: 14px;
    background: #eaeaea;
    margin-left: 4px;
    animation: blink 1s infinite;
  }
  
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .bouncing-image {
    position: fixed;
    width: 80px;
    height: auto;
    z-index: 100;
    pointer-events: auto;
    cursor: pointer;
    image-rendering: crisp-edges;
  }

  /* responsive */
  @media (max-width: 768px) {
    body {
      padding: 20px 16px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .item {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      right: auto !important;
      text-align: center;
      margin: 8px 0;
      width: 100%;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .social-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
    }
    .name-large {
      font-size: 28px !important;
      margin: 20px 0 10px 0;
    }
    .description {
      margin-bottom: 20px;
    }
    .bouncing-image {
      width: 50px;
    }
  }

  @media (min-width: 769px) and (max-width: 1024px) {
    .item[style*="left:35%"] {
      left: 12% !important;
    }
    .item[style*="left:55%"] {
      left: 70% !important;
    }
  }
</style>
</head>
<body>

<!-- BOUNCING IMAGE -->
<img id="bouncingImage" class="bouncing-image" alt="bouncing">

<div class="container">
  <!-- nav -->
  <div class="item small nav-links" style="top:40px; left:55%;">
    <a href="projects.html">proj</a> &nbsp;
    <a href="photos.html">film</a>
  </div>

  <!-- main name -->
  <div class="item name-large" style="top:140px; left:35%; font-size:28px;">
    thugz<span class="accent">g</span>iving
  </div>

  <!-- description -->
  <div class="item small description" style="top:190px; left:35%;">
    second year cybersecurity student<span class="cursor"></span>
  </div>

  <!-- socials -->
  <div class="social-group">
    <div class="item" style="top:260px; left:35%;"><a href="https://www.youtube.com/channel/UCXIo3B0Rm_LnsjloIgtZpbQ" target="_blank">youtube</a></div>
    <div class="item" style="top:285px; left:37%;"><a href="https://instagram.com/thugzgiving" target="_blank">instagram</a></div>
    <div class="item" style="top:310px; left:34%;"><a href="https://steamcommunity.com/id/thugzgiving/" target="_blank">steam</a></div>
    <div class="item" style="top:335px; left:36%;"><a href="https://open.spotify.com/user/31msmbagleirkieupvtiz643nvf4" target="_blank">spotify</a></div>
    <div class="item" style="top:370px; left:33%;"><a href="https://www.depop.com/thugzgiving/" target="_blank">depop</a></div>
    <div class="item" style="top:395px; left:38%;"><a href="https://grailed.app.link/H4BeTJliT2b" target="_blank">grailed</a></div>
    <div class="item" style="top:420px; left:35%;"><a href="https://ebay.us/m/Suzufd" target="_blank">ebay</a></div>
  </div>
</div>

<script>

 
  const imageUrl = "images/skull.jpg";
  
  const img = document.getElementById("bouncingImage");
  img.src = imageUrl;
  
  let imgWidth = 80;
  let imgHeight = 80;
  
  let posX = window.innerWidth / 2;
  let posY = window.innerHeight / 2;
  let velX = 2.2;
  let velY = 1.8;
  
  img.onload = () => {
    imgWidth = img.offsetWidth;
    imgHeight = img.offsetHeight;
  };
  
  function updateBounce() {
    if (!img) return;
    
    const maxX = window.innerWidth - imgWidth - 20;
    const maxY = window.innerHeight - imgHeight - 20;
    const minX = 10;
    const minY = 10;
    
    posX += velX;
    posY += velY;
    
    if (posX >= maxX) {
      posX = maxX;
      velX = -velX;
    }
    if (posX <= minX) {
      posX = minX;
      velX = -velX;
    }
    if (posY >= maxY) {
      posY = maxY;
      velY = -velY;
    }
    if (posY <= minY) {
      posY = minY;
      velY = -velY;
    }
    
    img.style.left = posX + "px";
    img.style.top = posY + "px";
    
    requestAnimationFrame(updateBounce);
  }
  
  window.addEventListener("resize", () => {
    const maxX = window.innerWidth - imgWidth - 20;
    const maxY = window.innerHeight - imgHeight - 20;
    posX = Math.min(Math.max(posX, 10), maxX);
    posY = Math.min(Math.max(posY, 10), maxY);
  });
  
  window.addEventListener("load", () => {
    imgWidth = img.offsetWidth;
    imgHeight = img.offsetHeight;
    posX = Math.random() * (window.innerWidth - imgWidth - 40) + 20;
    posY = Math.random() * (window.innerHeight - imgHeight - 40) + 20;
    updateBounce();
  });
</script>
</body>
</html>
