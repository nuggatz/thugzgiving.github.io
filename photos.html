<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>film</title>

<style>
body {
    background: #0b0f10;
    color: #eaeaea;
    font-family: monospace;
    height: 150vh;
    margin: 0;
    overflow-x: hidden;
}

a {
    color: #eaeaea;
    text-decoration: none;
}
a:hover {
    text-decoration: underline;
}

.item {
    position: absolute;
    font-size: 14px;
}

.small { font-size: 12px; opacity: 0.7; }

img {
    max-width: 700px;
    width: 100%;
    display: block;
}
</style>
</head>
<body>

<!-- nav -->
<div class="item small" style="top:40px; left:55%;">
    <a href="index.html">home</a> &nbsp;
    <a href="projects.html">proj</a> &nbsp;
    <a href="photos.html">film</a>
</div>

<!-- counter -->
<div class="item small" id="counter" style="top:120px; left:48%;">
    .000
</div>

<!-- left nav -->
<div class="item" style="top:320px; left:20%; cursor:pointer;" onclick="prevImage()">
    L
</div>

<!-- image -->
<div class="item" style="top:180px; left:30%;">
    <img id="galleryImage" src="image1.jpg">
</div>

<!-- right nav -->
<div class="item" style="top:320px; left:78%; cursor:pointer;" onclick="nextImage()">
    R
</div>

<!-- caption -->
<div class="item small" id="caption" style="top:600px; left:42%;">
    "you must see the hurt"
</div>

<script>
const images = [
    {
        src: "image1.jpg",
        caption: '"you must see the hurt"'
    },
    {
        src: "image2.jpg",
        caption: '"memory fades slowly"'
    },
    {
        src: "image3.jpg",
        caption: '"another moment"'
    }
];

let index = 0;

function updateGallery() {
    document.getElementById("galleryImage").src = images[index].src;
    document.getElementById("caption").innerText = images[index].caption;
    document.getElementById("counter").innerText =
        "." + String(index).padStart(3, "0");
}

function nextImage() {
    index = (index + 1) % images.length;
    updateGallery();
}

function prevImage() {
    index = (index - 1 + images.length) % images.length;
    updateGallery();
}
</script>

</body>
</html>
