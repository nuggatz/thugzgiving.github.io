<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>thugzgiving — home</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0b0f10;
    color: #eaeaea;
    font-family: monospace;
    min-height: 100vh;
    margin: 0;
    padding: 24px 20px;
    overflow-x: hidden;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    width: 100%;
    min-height: 80vh;
  }

  a {
    color: #eaeaea;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }

  .item {
    position: absolute;
    font-size: 14px;
  }

  .small {
    font-size: 12px;
    opacity: 0.7;
  }

  .accent {
    color: #8aff80;
  }

  .cursor {
    display: inline-block;
    width: 6px;
    height: 14px;
    background: #eaeaea;
    margin-left: 4px;
    animation: blink 1s infinite;
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  /* desktop defaults */
  @media (max-width: 768px) {
    body {
      padding: 20px 16px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .item {
      position: relative !important;
      left: auto !important;
      top: auto !important;
      right: auto !important;
      text-align: center;
      margin: 8px 0;
      width: 100%;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .social-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
    }
    .name-large {
      font-size: 28px !important;
      margin: 20px 0 10px 0;
    }
    .description {
      margin-bottom: 20px;
    }
  }

  /* tablet adjustments */
  @media (min-width: 769px) and (max-width: 1024px) {
    .item[style*="left:35%"] {
      left: 12% !important;
    }
    .item[style*="left:55%"] {
      left: 70% !important;
    }
  }
</style>
</head>
<body>

    <div class="item" style="top:420px; left:35%;"><a href="https://ebay.us/m/Suzufd" target="_blank">ebay</a></div>
  </div>
</div>
