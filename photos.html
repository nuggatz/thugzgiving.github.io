<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>film — thugzgiving</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #0b0f10;
    color: #eaeaea;
    font-family: monospace;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    overflow-x: hidden;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 90vh;
  }

  a {
    color: #eaeaea;
    text-decoration: none;
  }
  a:hover {
    text-decoration: underline;
  }

  .item {
    position: absolute;
    font-size: 14px;
  }

  .small {
    font-size: 12px;
    opacity: 0.7;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
  }

  .gallery-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    margin: 80px 0 40px;
  }

  .nav-controls {
    display: flex;
    justify-content: center;
    gap: 60px;
    margin: 30px 0;
    width: 100%;
  }

  .nav-btn {
    font-size: 24px;
    cursor: pointer;
    background: none;
    border: none;
    color: #eaeaea;
    font-family: monospace;
    opacity: 0.8;
    transition: opacity 0.2s;
    padding: 10px 20px;
  }
  .nav-btn:hover {
    opacity: 1;
    text-decoration: underline;
  }

  .caption {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    opacity: 0.8;
    font-style: italic;
  }

  .counter {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 10px;
  }

  .loading {
    text-align: center;
    padding: 40px;
    opacity: 0.7;
  }

  @media (max-width: 768px) {
    body {
      padding: 16px;
    }
    .item {
      position: relative !important;
      left: auto !important;
      top: auto !important;
    }
    .nav-links {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-bottom: 20px;
      position: relative !important;
    }
    .gallery-wrapper {
      margin-top: 20px;
    }
    .nav-controls {
      gap: 40px;
    }
  }

  @media (min-width: 769px) {
    .nav-links {
      position: absolute;
      top: 40px;
      left: 55%;
    }
  }
</style>
</head>
<body>
<div class="container">
  <!-- nav -->
  <div class="item small nav-links">
    <a href="index.html">home</a> &nbsp;
    <a href="projects.html">proj</a> &nbsp;
    <a href="photos.html">film</a>
  </div>

  <div class="gallery-wrapper">
    <div class="counter" id="counter">.---</div>

    <img id="galleryImage" src="" alt="gallery image" style="max-width: 90%; max-height: 60vh; object-fit: contain;">

    <div class="nav-controls">
      <button class="nav-btn" onclick="prevImage()">← L</button>
      <button class="nav-btn" onclick="nextImage()">R →</button>
    </div>

    <div class="caption" id="caption"></div>
  </div>
</div>

<script>

 
const IMAGE_FOLDER = "images/";

const CAPTION_POOL = [
  " ",
  "\"god\"",
  "\"another\"",
  "\"truth\"",
  "\"what it feels for a girl\"",
  "\"my heart craves\"",
  "\"amor\"",
  "\"wait\"",
  "\"heaven i might find\"",
  "\"to remember\""
];


const imageFilenames = [
    "IMG_0049.JPG",
    "IMG_0070.JPG",
    "P1110701.JPG",
    "IMG_0057.JPG",
    "IMG_0054.JPG",
    "IMG_0029.JPG",
    "IMG_0062.JPG",
    "IMG_0079.JPG",
    "IMG_0080.JPG"
];


let images = [];
let index = 0;
let imageCaptions = new Map();

function loadImages() {
    // Build full paths to the images folder
    images = imageFilenames.map(filename => IMAGE_FOLDER + filename);
    
    // Assign random captions to each image
    for (let i = 0; i < images.length; i++) {
        const randomCaption = CAPTION_POOL[Math.floor(Math.random() * CAPTION_POOL.length)];
        imageCaptions.set(images[i], randomCaption);
    }
    
    if (images.length === 0) {
        document.getElementById("caption").innerText = "⚠️ no images — add filenames to imageFilenames";
        document.getElementById("counter").innerText = ".err";
        return;
    }
    
    index = 0;
    updateGallery();
}

function updateGallery() {
    if (images.length === 0) return;
    
    const imgElement = document.getElementById("galleryImage");
    if (imgElement) {
        imgElement.src = images[index];
        imgElement.alt = "image " + (index + 1);
    }
    
    const caption = imageCaptions.get(images[index]) || " ";
    const captionEl = document.getElementById("caption");
    if (captionEl) captionEl.innerText = caption;
    
    const counterEl = document.getElementById("counter");
    if (counterEl) counterEl.innerText = "." + String(index + 1).padStart(3, "0");
}

function nextImage() {
    if (images.length === 0) return;
    index = (index + 1) % images.length;
    updateGallery();
}

function prevImage() {
    if (images.length === 0) return;
    index = (index - 1 + images.length) % images.length;
    updateGallery();
}

loadImages();
</script>
</body>
</html>
