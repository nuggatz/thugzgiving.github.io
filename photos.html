<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photo Gallery</title>
<style>
  body {
    margin: 0;
    font-family: monospace;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    text-align: center;
  }

  .image-wrapper {
    position: relative;
    display: inline-block;
  }

  img {
    max-width: 800px;
    width: 100%;
    height: auto;
    display: block;
  }

  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    cursor: pointer;
    user-select: none;
    color: #333;
  }

  .left {
    left: -40px;
  }

  .right {
    right: -40px;
  }

  .counter {
    margin-bottom: 10px;
    color: #555;
  }

  .caption {
    margin-top: 10px;
    color: #333;
  }
</style>
</head>
<body>

<div class="container">
  <div class="counter" id="counter">.000</div>

  <div class="image-wrapper">
    <div class="nav left" onclick="prevImage()">L</div>
    <img id="galleryImage" src="image1.jpg">
    <div class="nav right" onclick="nextImage()">R</div>
  </div>

  <div class="caption" id="caption">"you must see the hurt"</div>
</div>

<script>
  const images = [
    {
      src: "image1.jpg",
      caption: '"you must see the hurt"'
    },
    {
      src: "image2.jpg",
      caption: '"another moment captured"'
    },
    {
      src: "image3.jpg",
      caption: '"memory fades slowly"'
    }
  ];

  let index = 0;

  function updateGallery() {
    document.getElementById("galleryImage").src = images[index].src;
    document.getElementById("caption").innerText = images[index].caption;
    document.getElementById("counter").innerText =
      "." + String(index).padStart(3, "0");
  }

  function nextImage() {
    index = (index + 1) % images.length;
    updateGallery();
  }

  function prevImage() {
    index = (index - 1 + images.length) % images.length;
    updateGallery();
  }
</script>

</body>
</html>
